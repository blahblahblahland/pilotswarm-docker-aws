services:
  postgres:
    image: postgres:15
    container_name: pilotswarm_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pilotswarm
    ports:
      - "5432:5432"

  pilotswarm:
    build:
      context: .
      dockerfile: DockerFile
    container_name: pilotswarm_app
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:admin@postgres:5432/pilotswarm